<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuscaapIA — DevUnifiedTool</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">BuscaapIA</span>
      </div>
      <span class="badge">DevUnifiedTool</span>
    </header>

    <main id="auth-view" class="card">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="login">Entrar</button>
        <button type="button" class="tab" data-tab="register">Cadastrar</button>
      </div>

      <form id="login-form" class="form">
        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Acesse sua conta para continuar</p>
        <label>
          E-mail
          <input type="email" name="email" required placeholder="voce@email.com" />
        </label>
        <label>
          Senha
          <input type="password" name="password" required placeholder="••••••" minlength="6" />
        </label>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <form id="register-form" class="form hidden">
        <h2>Criar conta</h2>
        <p class="subtitle">Comece a usar a plataforma</p>
        <label>
          Usuário
          <input type="text" name="username" required placeholder="seu_usuario" minlength="3" />
        </label>
        <label>
          E-mail
          <input type="email" name="email" required placeholder="voce@email.com" />
        </label>
        <label>
          Senha
          <input type="password" name="password" required placeholder="••••••" minlength="6" />
        </label>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </form>

      <p id="auth-message" class="message" role="alert"></p>
    </main>

    <main id="dashboard-view" class="card hidden">
      <div class="dashboard-header">
        <div>
          <h2>Olá, <span id="user-name">—</span></h2>
          <p class="subtitle" id="user-email">—</p>
        </div>
        <button type="button" id="logout-btn" class="btn btn-ghost">Sair</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Papel</span>
          <span class="stat-value" id="user-role">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">API</span>
          <span class="stat-value" id="api-status">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Banco</span>
          <span class="stat-value" id="db-status">—</span>
        </div>
      </div>

      <section class="panel">
        <h3>Health check</h3>
        <pre id="health-json" class="code-block">Carregando...</pre>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
